<div class="main-content">

    <h1>Company Profile</h1>

    <div class="profile-form">

        <div class="form-group">
            <label>Company Logo</label>
            <input type="file">
        </div>

        <div class="form-group">
            <label>Company Name</label>
            <input type="text" placeholder="Enter company name">
        </div>

        <div class="form-group">
            <label>Industry</label>
            <input type="text" placeholder="Enter industry">
        </div>

        <div class="form-group">
            <label>Website</label>
            <input type="url" placeholder="https://example.com">
        </div>

        <div class="form-group">
            <label>Company Size</label>
            <input type="text" placeholder="e.g. 50-100 Employees">
        </div>

        <div class="form-group">
            <label>Headquarters</label>
            <input type="text" placeholder="Enter location">
        </div>

        <div class="form-group">
            <label>Company Description</label>
            <textarea placeholder="Write about your company"></textarea>
        </div>

        <div class="form-group">
            <label>LinkedIn</label>
            <input type="url" placeholder="LinkedIn URL">
        </div>

        <div class="form-group">
            <label>Instagram</label>
            <input type="url" placeholder="Instagram URL">
        </div>

        <div class="form-group">
            <label>Twitter / X</label>
            <input type="url" placeholder="Twitter URL">
        </div>

        <button class="btn">Save Changes</button>

    </div>

</div>

<script src="../js/recruiter.js"></script>

</body>
</html>
