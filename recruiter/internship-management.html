<div class="main-content">

    <h1>Internship Management</h1>

    <div class="profile-form">

        <div class="form-group">
            <label>Internship Title</label>
            <input type="text" placeholder="Frontend Developer Intern">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" placeholder="Hyderabad / Remote">
        </div>

        <div class="form-group">
            <label>Duration</label>
            <input type="text" placeholder="3 Months">
        </div>

        <div class="form-group">
            <label>Stipend</label>
            <input type="text" placeholder="₹10,000 / Month">
        </div>

        <div class="form-group">
            <label>Skills Required</label>
            <input type="text" placeholder="HTML, CSS, JavaScript">
        </div>

        <div class="form-group">
            <label>Application Deadline</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Internship Description</label>
            <textarea placeholder="Describe the internship role"></textarea>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select>
                <option>Draft</option>
                <option>Published</option>
                <option>Closed</option>
            </select>
        </div>

        <button class="btn">Publish Internship</button>

    </div>

</div>

<script src="../js/recruiter.js"></script>

</body>
</html>
